name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install npm dependencies
        run: npm ci
      
      - name: Install Capacitor
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          npx cap init "ID2PDF" "com.id2pdf.app" --web-dir=dist --ci
      
      - name: Build web app
        run: npm run build
      
      - name: Sync to Android
        run: npx cap sync android
      
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties
      
      - name: Build debug APK
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.4
          arguments: assembleDebug
          build-root-directory: android
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
      
      - name: Upload APK as release asset
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          asset_name: ID2PDF-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
