<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="身份证扫描与PDF生成工具，支持实时摄像头采集身份证正反面图像，自动检测边缘并生成PDF文档" />
    <meta name="keywords" content="身份证扫描,PDF生成,证件采集,Vue应用" />
    <meta name="theme-color" content="#4285f4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- 添加 OpenCV.js -->
    <script async src="https://docs.opencv.org/4.5.5/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <title>身份证扫描与PDF生成 - Vue-ID2PDF</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // OpenCV.js 加载完成后触发事件
      function onOpenCvReady() {
        console.log('OpenCV.js 已加载完成');
        window.cvReady = true;
        window.dispatchEvent(new CustomEvent('opencv-ready'));
      }
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
